<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Based OS Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="desktop-icons">
            <div class="desk_icon" data-app="chrome">
                <img src="images/chrome.webp" alt="Chrome">
                <span>Chrome</span>
            </div>
            <div class="desk_icon" data-app="edge">
                <img src="images/edge.webp" alt="Edge">
                <span>Edge</span>
            </div>
            <div class="desk_icon" data-app="folder">
                <img src="images/folder.webp" alt="Folder">
                <span>Folder</span>
            </div>
        </div>


        <div class="bottom-nav">
            <img src="images/chrome.webp" class="logo" data-app="chrome">
            <img src="images/edge.webp" class="logo" data-app="edge">
            <img src="images/folder.webp" class="logo" data-app="folder">
            <img src="images/safari.webp" class="logo" data-app="safari">
            <img src="images/settings.webp" class="logo" data-app="settings">
        </div>

        <div class="windows">
            
        </div>

        <div class="clock-box">
            <div class="time"></div>
            <div class="date"></div>
        </div>

        <div class="options">
            <ul>
                <li class="copy">Copy</li>
                <li class="paste">Paste</li>
                <li class="cut">Cut</li>
                <li class="delete">Delete</li>
                <li class="create">Create Folder</li>
            </ul>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
